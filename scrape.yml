name: 🔍 Virtuoso Price Tracker

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🌐 Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser

      - name: 📦 Install Node dependencies
        run: npm install

      - name: 🔍 Run scraper
        env:
          CHROMIUM_PATH: /usr/bin/chromium-browser
        run: node scraper.js --json --ci

      - name: 📤 Upload debug snapshot (dacă scraping-ul a eșuat)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-snapshot
          path: |
            debug-page.html
            debug-screenshot.png
          if-no-files-found: ignore
          retention-days: 3

      - name: 📊 Verifică dacă s-au modificat prețurile
        id: check_changes
        run: |
          if [ ! -f prices.json ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          elif git diff --quiet prices.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 💾 Commit prețuri actualizate
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "Price Tracker Bot"
          git config user.email "bot@github-actions"
          git add prices.json history/ report.md
          git commit -m "💰 Update prețuri $(date +'%Y-%m-%d %H:%M')"
          git push
